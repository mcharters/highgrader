---
layout: default
---
<!-- Minesweeper Game -->
<div class="ms-wrap">
    <div class="ms-container">
        <div class="ms-header">
            <div class="ms-counter" id="ms-mines">010</div>
            <button class="ms-flag-toggle" id="ms-flag-btn" title="Toggle flag mode (for mobile)">🚩</button>
            <button class="ms-reset" id="ms-reset">⛏️</button>
            <div class="ms-counter" id="ms-timer">000</div>
        </div>
        <div class="ms-grid" id="ms-grid"></div>
        <div class="ms-message" id="ms-message"></div>
    </div>
</div>

<!-- Win reward modal -->
<div class="reward-modal" id="reward-modal" hidden>
    <div class="reward-backdrop" id="reward-backdrop"></div>
    <div class="reward-content">
        <button class="reward-close" id="reward-close" aria-label="Close">✕</button>
        <div class="reward-title">💎 YOU STRUCK GOLD! 💎</div>
        <div class="reward-video-wrap" id="reward-video-wrap"></div>
    </div>
</div>

<script>
    // === MINESWEEPER ===
    (function() {
        const ROWS = 9, COLS = 9, MINES = 10;
        let board, revealed, flagged, mineMap, gameOver, gameWon, firstClick, flagCount, timerVal, timerInterval;
        let flagMode = false;

        const gridEl = document.getElementById('ms-grid');
        const minesEl = document.getElementById('ms-mines');
        const timerEl = document.getElementById('ms-timer');
        const resetEl = document.getElementById('ms-reset');
        const messageEl = document.getElementById('ms-message');
        const flagBtn = document.getElementById('ms-flag-btn');
        const rewardModal = document.getElementById('reward-modal');
        const rewardVideoWrap = document.getElementById('reward-video-wrap');
        const rewardClose = document.getElementById('reward-close');
        const rewardBackdrop = document.getElementById('reward-backdrop');

        const VIMEO_EMBED = '<iframe src="https://player.vimeo.com/video/1183215318?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479&amp;autoplay=1" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" title="minecountry"></iframe>';

        gridEl.style.gridTemplateColumns = `repeat(${COLS}, clamp(28px, 8vw, 38px))`;

        function showReward() {
            rewardVideoWrap.innerHTML = VIMEO_EMBED;
            rewardModal.hidden = false;
            requestAnimationFrame(() => rewardModal.classList.add('open'));
        }

        function hideReward() {
            rewardModal.classList.remove('open');
            setTimeout(() => {
                rewardModal.hidden = true;
                rewardVideoWrap.innerHTML = '';
            }, 250);
        }

        rewardClose.addEventListener('click', hideReward);
        rewardBackdrop.addEventListener('click', hideReward);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !rewardModal.hidden) hideReward();
        });

        function init() {
            board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
            revealed = Array.from({length: ROWS}, () => Array(COLS).fill(false));
            flagged = Array.from({length: ROWS}, () => Array(COLS).fill(false));
            mineMap = Array.from({length: ROWS}, () => Array(COLS).fill(false));
            gameOver = false;
            gameWon = false;
            firstClick = true;
            flagCount = 0;
            timerVal = 0;
            clearInterval(timerInterval);
            timerInterval = null;
            resetEl.textContent = '⛏️';
            messageEl.textContent = '';
            flagMode = false;
            flagBtn.classList.remove('active');
            if (rewardModal && !rewardModal.hidden) hideReward();
            updateCounters();
            render();
        }

        function placeMines(safeR, safeC) {
            let placed = 0;
            while (placed < MINES) {
                const r = Math.floor(Math.random() * ROWS);
                const c = Math.floor(Math.random() * COLS);
                if (mineMap[r][c]) continue;
                if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
                mineMap[r][c] = true;
                placed++;
            }
            // Calculate adjacency numbers
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (mineMap[r][c]) { board[r][c] = -1; continue; }
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            const nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && mineMap[nr][nc]) count++;
                        }
                    }
                    board[r][c] = count;
                }
            }
        }

        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                timerVal = Math.min(999, timerVal + 1);
                timerEl.textContent = String(timerVal).padStart(3, '0');
            }, 1000);
        }

        function updateCounters() {
            minesEl.textContent = String(Math.max(0, MINES - flagCount)).padStart(3, '0');
            timerEl.textContent = String(timerVal).padStart(3, '0');
        }

        function revealCell(r, c) {
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
            if (revealed[r][c] || flagged[r][c]) return;
            revealed[r][c] = true;

            if (board[r][c] === 0) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        revealCell(r + dr, c + dc);
                    }
                }
            }
        }

        function checkWin() {
            let unrevealed = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (!revealed[r][c]) unrevealed++;
                }
            }
            if (unrevealed === MINES) {
                gameWon = true;
                gameOver = true;
                clearInterval(timerInterval);
                resetEl.textContent = '💎';
                messageEl.textContent = '💎 YOU STRUCK GOLD! 💎';
                // Auto-flag remaining mines
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (!revealed[r][c]) flagged[r][c] = true;
                    }
                }
                flagCount = MINES;
                updateCounters();
                render();
                showReward();
            }
        }

        function handleLoss(hitR, hitC) {
            gameOver = true;
            clearInterval(timerInterval);
            resetEl.textContent = '💀';
            messageEl.textContent = '🧨 CAVE IN! 🧨';
            // Reveal all mines
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (mineMap[r][c]) revealed[r][c] = true;
                }
            }
            render();
            // Highlight the mine that was clicked
            const hitCell = gridEl.children[hitR * COLS + hitC];
            if (hitCell) hitCell.classList.add('mine-hit');
        }

        function handleClick(r, c) {
            if (gameOver) return;
            if (revealed[r][c] || flagged[r][c]) return;

            if (firstClick) {
                firstClick = false;
                placeMines(r, c);
                startTimer();
            }

            if (mineMap[r][c]) {
                handleLoss(r, c);
                return;
            }

            revealCell(r, c);
            checkWin();
            render();
        }

        function handleFlag(r, c) {
            if (gameOver) return;
            if (revealed[r][c]) return;

            flagged[r][c] = !flagged[r][c];
            flagCount += flagged[r][c] ? 1 : -1;
            updateCounters();
            render();
        }

        function render() {
            gridEl.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('ms-cell');

                    if (revealed[r][c]) {
                        cell.classList.add('revealed');
                        if (mineMap[r][c]) {
                            cell.classList.add('mine');
                            cell.textContent = '🧨';
                        } else if (board[r][c] > 0) {
                            const num = document.createElement('span');
                            num.className = 'n' + board[r][c];
                            num.textContent = board[r][c];
                            cell.appendChild(num);
                        }
                    } else if (flagged[r][c]) {
                        cell.classList.add('flagged');
                        cell.textContent = '🚩';
                    } else {
                        cell.classList.add('hidden');
                    }

                    // Desktop: left click = reveal, right click = flag
                    cell.addEventListener('click', (e) => {
                        e.preventDefault();
                        if (flagMode) {
                            handleFlag(r, c);
                        } else {
                            handleClick(r, c);
                        }
                    });
                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleFlag(r, c);
                    });

                    gridEl.appendChild(cell);
                }
            }
        }

        // Flag mode toggle (for mobile)
        flagBtn.addEventListener('click', () => {
            flagMode = !flagMode;
            flagBtn.classList.toggle('active', flagMode);
        });

        // Reset button
        resetEl.addEventListener('click', init);

        // Prevent context menu on the grid
        gridEl.addEventListener('contextmenu', (e) => e.preventDefault());

        init();
    })();
</script>
