<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} — {% endif %}⛏️ HIGH GRADER ⛏️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d1a;
            text-align: center;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 5vh;
        }

        /* Starfield background */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        /* Emoji art container */
        .emoji-art {
            position: relative;
            z-index: 1;
            user-select: none;
            padding: 20px 10px;
        }
        .emoji-line {
            display: inline-grid;
            justify-content: center;
            line-height: 1.1;
            font-size: clamp(8px, 2.5vw, 32px);
            gap: 1px;
        }
        .emoji-line span {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 1.2em;
            height: 1.2em;
        }
        .emoji-line .off {
            opacity: 0;
        }

        /* Sparkle animation on emoji cells */
        @keyframes emojiPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .sparkle {
            animation: emojiPop 2s ease-in-out infinite;
        }

        /* NFB film easter-egg links */
        .emoji-line a.film-link {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 1.2em;
            height: 1.2em;
            position: relative;
            cursor: pointer;
            transition: filter 0.2s;
        }
        .emoji-line a.film-link:hover {
            filter: brightness(1.4) drop-shadow(0 0 4px gold);
        }
        .emoji-line a.film-link::after {
            content: attr(title);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: #b08d57;
            font-size: 11px;
            font-family: monospace;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid #444;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }
        .emoji-line a.film-link:hover::after {
            opacity: 1;
        }

        /* === NAV === */
        .site-nav {
            position: relative;
            z-index: 1;
            margin-top: 10px;
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            font-family: monospace;
            font-size: clamp(12px, 2.5vw, 16px);
        }
        .site-nav a {
            color: #b08d57;
            text-decoration: none;
            padding: 4px 10px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #1a1a2e;
            transition: all 0.15s;
        }
        .site-nav a:hover {
            color: #fff;
            border-color: #b08d57;
            box-shadow: 0 0 6px rgba(176, 141, 87, 0.4);
        }
        .site-nav a.active {
            color: #fff;
            border-color: #b08d57;
        }

        /* === PAGE CONTENT (for prose pages) === */
        .page-content {
            position: relative;
            z-index: 1;
            max-width: 640px;
            margin: 30px auto 40px;
            padding: 20px;
            color: #d0d0e0;
            font-family: monospace;
            font-size: clamp(13px, 2.5vw, 16px);
            line-height: 1.6;
            text-align: left;
        }
        .page-content h1, .page-content h2, .page-content h3 {
            color: #b08d57;
            margin: 1.2em 0 0.5em;
            text-align: center;
        }
        .page-content p { margin: 0.8em 0; }
        .page-content a { color: #b08d57; }
        .page-content img {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 1.2em auto;
            border: 1px solid #444;
            border-radius: 6px;
            box-shadow: 0 0 12px rgba(176, 141, 87, 0.2);
        }

        /* === MINESWEEPER === */
        .ms-wrap {
            position: relative;
            z-index: 1;
            margin-top: 30px;
            padding-bottom: 40px;
        }
        .ms-container {
            display: inline-block;
            background: #1a1a2e;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 10px;
        }
        .ms-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 8px;
        }
        .ms-counter {
            font-family: monospace;
            font-size: clamp(16px, 4vw, 24px);
            color: #ff4444;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 2px 8px;
            min-width: 50px;
            text-align: center;
        }
        .ms-reset {
            font-size: clamp(20px, 5vw, 32px);
            cursor: pointer;
            background: none;
            border: 2px solid #444;
            border-radius: 6px;
            padding: 2px 8px;
            line-height: 1;
            transition: transform 0.1s;
        }
        .ms-reset:hover { transform: scale(1.1); }
        .ms-reset:active { transform: scale(0.95); }
        .ms-flag-toggle {
            font-size: clamp(16px, 4vw, 24px);
            cursor: pointer;
            background: none;
            border: 2px solid #444;
            border-radius: 6px;
            padding: 2px 8px;
            line-height: 1;
            transition: background 0.15s;
        }
        .ms-flag-toggle.active {
            background: rgba(255, 68, 68, 0.3);
            border-color: #ff4444;
        }
        .ms-grid {
            display: grid;
            gap: 1px;
            touch-action: manipulation;
            user-select: none;
        }
        .ms-cell {
            width: clamp(28px, 8vw, 38px);
            height: clamp(28px, 8vw, 38px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(14px, 3.5vw, 20px);
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            transition: background 0.1s;
        }
        .ms-cell.hidden {
            background: #2a2a4a;
            border: 1px solid #444;
            box-shadow: inset 1px 1px 0 #3a3a5a, inset -1px -1px 0 #1a1a3a;
        }
        .ms-cell.hidden:hover {
            background: #3a3a5a;
        }
        .ms-cell.revealed {
            background: #16162e;
            border: 1px solid #222;
        }
        .ms-cell.flagged {
            background: #2a2a4a;
            border: 1px solid #444;
            box-shadow: inset 1px 1px 0 #3a3a5a, inset -1px -1px 0 #1a1a3a;
        }
        .ms-cell.mine {
            background: #4a1a1a;
        }
        .ms-cell.mine-hit {
            background: #8a2222;
        }
        .ms-cell .n1 { color: #6699ff; }
        .ms-cell .n2 { color: #44bb44; }
        .ms-cell .n3 { color: #ff4444; }
        .ms-cell .n4 { color: #9944cc; }
        .ms-cell .n5 { color: #cc6622; }
        .ms-cell .n6 { color: #44cccc; }
        .ms-cell .n7 { color: #cccccc; }
        .ms-cell .n8 { color: #888888; }
        .ms-message {
            font-family: monospace;
            color: #b08d57;
            font-size: clamp(12px, 2.5vw, 16px);
            margin-top: 8px;
            min-height: 1.4em;
        }
    </style>
</head>
<body>
    <!-- Starfield -->
    <div class="stars" id="stars"></div>

    {% include header.html %}
    {% include nav.html %}

    {{ content }}

    <script>
        // === STARFIELD ===
        (function createStars() {
            const container = document.getElementById('stars');
            const count = 80;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = (Math.random() * 3).toFixed(1) + 's';
                star.style.animationDuration = (2 + Math.random() * 3).toFixed(1) + 's';
                container.appendChild(star);
            }
        })();
    </script>
</body>
</html>
